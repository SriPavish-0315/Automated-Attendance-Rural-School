{% extends "shared/base.html" %}
{% block title %}Add Class{% endblock %}
{% block content %}
<h1>Add Class / Section</h1>
<div class="form-card">
<form method="POST">
  <label>Class / Grade Name</label>
  <input type="text" name="grade_name" placeholder="e.g. Grade 5" required>

  <label>Section Name</label>
  <input type="text" name="section_name" placeholder="e.g. A" required>

  <label>Class Teacher</label>
  <select name="teacher_id">
    <option value="">-- Unassigned --</option>
    {% for t in teachers %}
    <option value="{{ t.user_id }}">{{ t.full_name }}</option>
    {% endfor %}
  </select>

  <label>Coordinator</label>
  <select name="coordinator_id">
    <option value="">-- Unassigned --</option>
    {% for c in coordinators %}
    <option value="{{ c.user_id }}">{{ c.full_name }}</option>
    {% endfor %}
  </select>

  <button type="submit" class="btn">Save</button>
</form>
</div>
{% endblock %}
