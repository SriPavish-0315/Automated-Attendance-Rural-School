{% extends "shared/base.html" %}
{% block title %}{% if staff %}Edit Staff{% else %}Add Staff{% endif %}{% endblock %}
{% block content %}
<h1>{% if staff %}Edit Staff Account{% else %}Add Staff Account{% endif %}</h1>
<div class="form-card">
<form method="POST">
  <label>Role</label>
  <select name="role" required>
    <option value="Teacher" {% if staff and staff.role_name == 'Teacher' %}selected{% endif %}>Teacher</option>
    <option value="Coordinator" {% if staff and staff.role_name == 'Coordinator' %}selected{% endif %}>Coordinator</option>
  </select>

  <label>Full Name</label>
  <input type="text" name="full_name" value="{{ staff.full_name if staff else '' }}" required>

  <label>Username</label>
  <input type="text" name="username" value="{{ staff.username if staff else '' }}" required>

  <label>Password</label>
  <input type="password" name="password" {% if not staff %}required{% endif %}>

  <label>Email</label>
  <input type="email" name="email" value="{{ staff.email if staff else '' }}">

  <label>Phone</label>
  <input type="text" name="phone" value="{{ staff.phone if staff else '' }}">

  <button type="submit" class="btn">{% if staff %}Update Account{% else %}Create Account{% endif %}</button>
</form>
</div>
{% endblock %}
